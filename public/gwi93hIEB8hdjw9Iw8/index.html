<body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useEffect, useCallback } = React;

const STORAGE_KEY = "ellemarie-posts-v2";

const POST_TYPES = {

  static: { label: "Static / Photo", icon: "\u{1F4F8}", platforms: ["instagram", "threads", "facebook", "tiktok"] },

const PLATFORM_INFO = {

const STATUSES = [
  { key: "concept", label: "Concept", color: "#7c4dba", bg: "rgba(124,77,186,0.15)" },
  { key: "scripted", label: "Scripted", color: "#c084fc", bg: "rgba(192,132,252,0.15)" },
  { key: "filmed", label: "Filmed", color: "#fb923c", bg: "rgba(251,146,60,0.15)" },
  { key: "ready", label: "Ready to Post", color: "#38bdf8", bg: "rgba(56,189,248,0.15)" },
  { key: "posted", label: "Posted", color: "#4ade80", bg: "rgba(74,222,128,0.15)" },

  platforms: { instagram: false, threads: false, facebook: false, tiktok: false, youtube: false },

  },
  {

    datePosted: "",
    notes: "371 views on TikTok. Posted on YT as photo since it fit square format.",
    createdAt: "2026-06-18T00:03:00Z",

  {

    title: "One Thing I Learned After a Year",

  {

  {

    caption: "I walked into a sub shop I go to often at work and the woman who is always there handing me my order said \"heyyy girrrlll!\"\n\nAlmost nothing feels better than being seen properly \u{1F970}",

    platforms: { instagram: true, threads: false, facebook: true, tiktok: false, youtube: false },
    datePosted: "",

    createdAt: "2026-06-18T00:08:00Z",
  },
];

// localStorage helpers
function loadPosts() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.posts && parsed.posts.length > 0) return parsed.posts;
    }
  } catch (e) { console.error("Load error:", e); }
  // First visit — seed with known posts
  savePosts(SEED_POSTS);
  return SEED_POSTS;
}

function savePosts(posts) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ posts, updatedAt: new Date().toISOString() }));
    return true;
  } catch (e) { console.error("Save error:", e); return false; }
}

function ContentTracker() {
  const [posts, setPosts] = useState(() => loadPosts());
  const [expandedId, setExpandedId] = useState(null);
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterType, setFilterType] = useState("all");
  const [filterPlatform, setFilterPlatform] = useState("all");
  const [saveStatus, setSaveStatus] = useState("");
  const [adding, setAdding] = useState(false);

  const save = useCallback((updatedPosts) => {
    setSaveStatus("saving");
    const ok = savePosts(updatedPosts);
    setSaveStatus(ok ? "saved" : "error");
    setTimeout(() => setSaveStatus(""), 1500);
  }, []);

  const updatePost = (id, field, value) => {
    const updated = posts.map((p) => {
      if (p.id !== id) return p;
      const newPost = { ...p, [field]: value };
      if (field === "platforms") {
        if (value.instagram && !p.platforms.instagram) {
          newPost.platforms = { ...value, threads: true, facebook: true };
        }
      }
      return newPost;
    });
    setPosts(updated);
    save(updated);
  };

  const togglePlatform = (id, platform) => {
    const post = posts.find((p) => p.id === id);
    if (!post) return;
    const newPlatforms = { ...post.platforms, [platform]: !post.platforms[platform] };
    if (platform === "instagram" && !post.platforms.instagram) {
      newPlatforms.threads = true;
      newPlatforms.facebook = true;
    }
    updatePost(id, "platforms", newPlatforms);
  };

  const addPost = () => {
    const newPost = defaultPost();
    const updated = [newPost, ...posts];
    setPosts(updated);
    setExpandedId(newPost.id);
    setAdding(true);
    save(updated);
  };

  const deletePost = (id) => {
    const updated = posts.filter((p) => p.id !== id);
    setPosts(updated);
    setExpandedId(null);
    save(updated);
  };

  const duplicatePost = (id) => {
    const source = posts.find((p) => p.id === id);
    if (!source) return;
    const newPost = {
      ...source,
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      title: source.title + " (copy)",
      platforms: { instagram: false, threads: false, facebook: false, tiktok: false, youtube: false },
      status: "concept",
      datePosted: "",
      createdAt: new Date().toISOString(),
    };
    const updated = [newPost, ...posts];
    setPosts(updated);
    setExpandedId(newPost.id);
    save(updated);
  };

  const movePost = (id, direction) => {
    const idx = posts.findIndex((p) => p.id === id);
    if (idx < 0) return;
    const newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= posts.length) return;
    const updated = [...posts];
    [updated[idx], updated[newIdx]] = [updated[newIdx], updated[idx]];
    setPosts(updated);
    save(updated);
  };

  const filtered = posts.filter((p) => {
    if (filterStatus !== "all" && p.status !== filterStatus) return false;
    if (filterType !== "all" && p.type !== filterType) return false;
    if (filterPlatform !== "all" && !p.platforms[filterPlatform]) return false;
    return true;
  });

  const statusCounts = STATUSES.reduce((acc, s) => {
    acc[s.key] = posts.filter((p) => p.status === s.key).length;
    return acc;
  }, {});

  const platformCounts = Object.keys(PLATFORM_INFO).reduce((acc, p) => {
    acc[p] = posts.filter((post) => post.platforms[p]).length;
    return acc;
  }, {});

  return (
    <div style={styles.container}>
      <div style={styles.header}>
        <div style={styles.headerTop}>
          <h1 style={styles.title}>miss.ellemarie</h1>
          <div style={styles.saveIndicator}>
            {saveStatus === "saving" && <span style={{ color: "#c084fc" }}>saving...</span>}
            {saveStatus === "saved" && <span style={{ color: "#4ade80" }}>{"\u2713"} saved</span>}
            {saveStatus === "error" && <span style={{ color: "#ef4444" }}>save failed</span>}
          </div>
        </div>
        <p style={styles.subtitle}>content tracker</p>

        <div style={styles.statsRow}>
          {STATUSES.map((s) => (
            <div
              key={s.key}
              onClick={() => setFilterStatus(filterStatus === s.key ? "all" : s.key)}
              style={{
                ...styles.statChip,
                background: filterStatus === s.key ? s.bg : "rgba(255,255,255,0.04)",
                borderColor: filterStatus === s.key ? s.color : "rgba(255,255,255,0.08)",
              }}
            >
              <span style={{ color: s.color, fontWeight: 700, fontSize: "1rem" }}>{statusCounts[s.key] || 0}</span>
              <span style={{ color: "rgba(200,180,230,0.6)", fontSize: "0.65rem" }}>{s.label}</span>
            </div>
          ))}
        </div>

        <div style={styles.statsRow}>
          {Object.entries(PLATFORM_INFO).map(([key, info]) => (
            <div
              key={key}
              onClick={() => setFilterPlatform(filterPlatform === key ? "all" : key)}
              style={{
                ...styles.statChip,
                background: filterPlatform === key ? info.color + "22" : "rgba(255,255,255,0.04)",
                borderColor: filterPlatform === key ? info.color : "rgba(255,255,255,0.08)",
              }}
            >
              <span style={{ color: info.color, fontWeight: 700, fontSize: "1rem" }}>{platformCounts[key] || 0}</span>
              <span style={{ color: "rgba(200,180,230,0.6)", fontSize: "0.65rem" }}>{info.label}</span>
            </div>
          ))}
        </div>

        <div style={styles.controls}>
          <div style={styles.filterRow}>
            <select value={filterType} onChange={(e) => setFilterType(e.target.value)} style={styles.select}>
              <option value="all">All types</option>
              <option value="short">Shorts / Reels</option>
              <option value="static">Static / Photos</option>
            </select>
            {(filterStatus !== "all" || filterType !== "all" || filterPlatform !== "all") && (
              <button onClick={() => { setFilterStatus("all"); setFilterType("all"); setFilterPlatform("all"); }} style={styles.clearBtn}>Clear filters</button>
            )}
          </div>
          <button onClick={addPost} style={styles.addBtn}>+ New Post</button>
        </div>
      </div>

      <div style={styles.list}>
        {filtered.length === 0 && (
          <div style={styles.empty}>{posts.length === 0 ? "No posts yet \u2014 tap + New Post to start" : "No posts match these filters"}</div>
        )}

        {filtered.map((post) => {
          const isExpanded = expandedId === post.id;
          const statusInfo = STATUSES.find((s) => s.key === post.status) || STATUSES[0];
          const typeInfo = POST_TYPES[post.type] || POST_TYPES.short;
          const postedCount = Object.values(post.platforms).filter(Boolean).length;
          const totalPlatforms = typeInfo.platforms.length;

          return (
            <div key={post.id} style={{ ...styles.card, borderLeftColor: statusInfo.color }}>
              <div onClick={() => { setExpandedId(isExpanded ? null : post.id); setAdding(false); }} style={styles.cardHeader}>
                <div style={styles.cardHeaderLeft}>
                  <span style={{ fontSize: "1rem" }}>{typeInfo.icon}</span>
                  <div>
                    <div style={styles.cardTitle}>{post.title || "Untitled"}</div>
                    <div style={styles.cardMeta}>
                      <span style={{ color: statusInfo.color, fontWeight: 600, fontSize: "0.7rem" }}>{statusInfo.label}</span>
                      <span style={styles.dot}>{"\u00B7"}</span>
                      <span style={{ fontSize: "0.7rem", color: "rgba(200,180,230,0.5)" }}>{postedCount}/{totalPlatforms} platforms</span>
                    </div>
                  </div>
                </div>
                <div style={styles.platformDots}>
                  {typeInfo.platforms.map((p) => (
                    <div key={p} style={{
                      width: 8, height: 8, borderRadius: "50%",
                      background: post.platforms[p] ? PLATFORM_INFO[p].color : "rgba(255,255,255,0.1)",
                      border: "1px solid " + (post.platforms[p] ? PLATFORM_INFO[p].color : "rgba(255,255,255,0.15)"),
                    }} title={PLATFORM_INFO[p].label} />
                  ))}
                </div>
              </div>

              {isExpanded && (
                <div style={styles.editor}>
                  <input type="text" value={post.title} onChange={(e) => updatePost(post.id, "title", e.target.value)}
                    placeholder="Post title..." style={styles.inputTitle} autoFocus={adding} />

                  <div style={styles.row}>
                    <select value={post.type} onChange={(e) => updatePost(post.id, "type", e.target.value)} style={styles.select}>
                      {Object.entries(POST_TYPES).map(([k, v]) => (<option key={k} value={k}>{v.icon} {v.label}</option>))}
                    </select>
                    <select value={post.status} onChange={(e) => updatePost(post.id, "status", e.target.value)} style={styles.select}>
                      {STATUSES.map((s) => (<option key={s.key} value={s.key}>{s.label}</option>))}
                    </select>
                  </div>

                  <textarea value={post.caption} onChange={(e) => updatePost(post.id, "caption", e.target.value)}
                    placeholder="Caption..." style={styles.textarea} rows={3} />

                  <input type="text" value={post.hashtags} onChange={(e) => updatePost(post.id, "hashtags", e.target.value)}
                    placeholder="#hashtags..." style={styles.inputHashtags} />

                  <div style={styles.platformSection}>
                    <div style={styles.platformLabel}>
                      {post.type === "short" ? "IG \u2192 Threads+FB (auto) \u2192 TikTok \u2192 YouTube" : "IG + TikTok \u2192 Threads+FB (auto)"}
                    </div>
                    <div style={styles.platformGrid}>
                      {POST_TYPES[post.type].platforms.map((p) => {
                        const info = PLATFORM_INFO[p];
                        return (
                          <button key={p} onClick={() => togglePlatform(post.id, p)} style={{
                            ...styles.platformBtn,
                            background: post.platforms[p] ? info.color + "22" : "rgba(255,255,255,0.04)",
                            borderColor: post.platforms[p] ? info.color : "rgba(255,255,255,0.1)",
                            opacity: info.auto ? 0.7 : 1,
                          }}>
                            <span style={{ color: post.platforms[p] ? info.color : "rgba(200,180,230,0.5)", fontWeight: 600, fontSize: "0.8rem" }}>{info.label}</span>
                            {post.platforms[p] && <span style={{ fontSize: "0.7rem" }}>{"\u2713"}</span>}
                            {info.auto && <span style={{ fontSize: "0.55rem", color: "rgba(200,180,230,0.4)" }}>{info.autoNote}</span>}
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  <div style={styles.row}>
                    <input type="date" value={post.datePosted} onChange={(e) => updatePost(post.id, "datePosted", e.target.value)}
                      style={styles.dateInput} />
                  </div>
                  <textarea value={post.notes} onChange={(e) => updatePost(post.id, "notes", e.target.value)}
                    placeholder="Notes (performance, ideas, etc)..." style={{ ...styles.textarea, fontSize: "0.8rem" }} rows={2} />

                  <div style={styles.actions}>
                    <div style={styles.actionsLeft}>
                      <button onClick={() => movePost(post.id, -1)} style={styles.actionBtn} title="Move up">{"\u2191"}</button>
                      <button onClick={() => movePost(post.id, 1)} style={styles.actionBtn} title="Move down">{"\u2193"}</button>
                      <button onClick={() => duplicatePost(post.id)} style={styles.actionBtn} title="Duplicate">{"\u29C9"}</button>
                    </div>
                    <button onClick={() => deletePost(post.id)} style={styles.deleteBtn}>Delete</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

const styles = {

  header: {

    borderBottom: "1px solid rgba(168,130,220,0.1)",
    position: "sticky", top: 0, zIndex: 10,
    background: "linear-gradient(145deg, #0d0515 0%, #1a0a2e 100%)",
  },

  title: { fontSize: "1.3rem", fontWeight: 700, margin: 0, color: "#f0eaf8" },
  subtitle: { fontSize: "0.75rem", color: "rgba(200,180,230,0.4)", margin: "0.1rem 0 0.75rem" },
  saveIndicator: { fontSize: "0.75rem" },

  },

  select: {
    background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)",
    borderRadius: "8px", color: "#e8e0f0", padding: "0.4rem 0.5rem",
    fontSize: "0.8rem", outline: "none", flex: 1, fontFamily: "inherit",
  },
  clearBtn: {
    background: "none", border: "none", color: "rgba(200,180,230,0.5)",
    fontSize: "0.75rem", cursor: "pointer", padding: "0.3rem", fontFamily: "inherit",
  },
  addBtn: {
    background: "rgba(124,77,186,0.3)", border: "1px solid rgba(124,77,186,0.5)",
    borderRadius: "8px", color: "#c084fc", padding: "0.4rem 0.75rem",
    fontSize: "0.8rem", fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "inherit",
  },
  list: { padding: "0.5rem" },
  empty: { textAlign: "center", color: "rgba(200,180,230,0.3)", padding: "3rem 1rem", fontSize: "0.85rem" },

    borderLeft: "3px solid", borderRadius: "10px", marginBottom: "0.5rem", overflow: "hidden",
  },
  cardHeader: {
    display: "flex", justifyContent: "space-between", alignItems: "center",
    padding: "0.75rem 0.75rem", cursor: "pointer",
  },
