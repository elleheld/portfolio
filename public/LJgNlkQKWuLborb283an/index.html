<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Time Tracker</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="style.css?v=5" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-top">
        <div>
          <h1>⏱ Time Tracker</h1>
          <p class="subtitle">Company, ticket, and what you did — timed or backfilled.</p>
        </div>
        <a class="btn btn-ghost btn-small" href="dashboard.html">Live Dashboard →</a>
      </div>
      <div class="who-row">
        <span>Tracking as <strong id="who-display">—</strong></span>
        <button id="switch-who-btn" class="btn btn-ghost btn-small">Switch</button>
        <span id="sync-status" class="sync-status"></span>
      </div>
    </header>

    <div id="bolt-section" class="bolt-section">
      <span id="bolt-icon" class="bolt-icon">&#9889;</span>
      <span id="bolt-label" class="bolt-label">No timer running</span>
      <span id="bolt-elapsed" class="bolt-elapsed mono" hidden>00:00:00</span>
      <button id="bolt-resume" class="btn btn-ghost btn-small" hidden></button>
      <button id="bolt-stop" class="btn btn-danger btn-small" hidden>Stop</button>
    </div>

    <div class="week-nav">
      <button id="prev-week" class="btn btn-ghost" title="Previous week">&larr;</button>
      <div id="week-label" class="week-label"></div>
      <button id="next-week" class="btn btn-ghost" title="Next week">&rarr;</button>
      <button id="this-week" class="btn btn-ghost">This Week</button>
    </div>

    <div id="days" class="days"></div>
  </div>

  <datalist id="company-list"></datalist>

  <div id="time-modal-backdrop" class="modal-backdrop" hidden>
    <div class="modal">
      <h3>Set start &amp; end time</h3>
      <div class="modal-field">
        <label for="time-modal-start">Start</label>
        <input type="time" id="time-modal-start" step="60" />
      </div>
      <div class="modal-field">
        <label for="time-modal-end">End</label>
        <input type="time" id="time-modal-end" step="60" />
      </div>
      <div class="modal-actions">
        <button id="time-modal-cancel" class="btn btn-ghost">Cancel</button>
        <button id="time-modal-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="viz-tooltip" class="viz-tooltip" hidden></div>

  <div id="identity-gate" class="identity-gate">
    <div class="identity-gate-card">
      <h2>Who's tracking?</h2>
      <p>Pick your name so your time syncs across devices and shows up on the live dashboard.</p>

      <form id="gate-step-name" class="gate-step">
        <div class="modal-field">
          <label for="gate-name-input">Name</label>
          <input type="text" id="gate-name-input" list="people-list" placeholder="Your name" autocomplete="off" />
          <datalist id="people-list"></datalist>
        </div>
        <p id="gate-name-error" class="gate-error" hidden></p>
        <button type="submit" class="btn btn-primary">Continue</button>
      </form>

      <form id="gate-step-password" class="gate-step" hidden>
        <p id="gate-password-context" class="gate-context"></p>
        <div class="modal-field">
          <label for="gate-password-input">Password</label>
          <input type="password" id="gate-password-input" autocomplete="off" />
        </div>
        <div class="modal-field" id="gate-confirm-field" hidden>
          <label for="gate-password-confirm">Confirm password</label>
          <input type="password" id="gate-password-confirm" autocomplete="off" />
        </div>
        <p id="gate-password-error" class="gate-error" hidden></p>
        <div class="modal-actions" style="justify-content: space-between;">
          <button type="button" id="gate-back-btn" class="btn btn-ghost">&larr; Back</button>
          <button type="submit" id="gate-password-submit" class="btn btn-primary">Continue</button>
        </div>
      </form>
    </div>
  </div>

  <script src="config.js?v=1"></script>
  <script src="sync.js?v=2"></script>
  <script src="app.js?v=6"></script>
</body>
</html>
