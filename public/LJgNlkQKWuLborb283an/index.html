<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Time Tracker</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>⏱ Time Tracker</h1>
      <p class="subtitle">Company, ticket, and what you did — timed or backfilled.</p>
    </header>

    <div id="running-banner" class="running-banner" hidden>
      <span class="running-bolt">&#9889;</span>
      <span id="running-label" class="running-label"></span>
      <span id="running-elapsed" class="running-elapsed mono">00:00:00</span>
      <button id="running-stop" class="btn btn-danger btn-small">Stop</button>
    </div>

    <div class="week-nav">
      <button id="prev-week" class="btn btn-ghost" title="Previous week">&larr;</button>
      <div id="week-label" class="week-label"></div>
      <button id="next-week" class="btn btn-ghost" title="Next week">&rarr;</button>
      <button id="this-week" class="btn btn-ghost">This Week</button>
    </div>

    <div id="days" class="days"></div>
  </div>

  <datalist id="company-list"></datalist>

  <script src="app.js"></script>
</body>
</html>
